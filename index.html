<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Competentieroos – Scouting Zelftoets</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <!-- React 18 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js">
    </script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
    </script>
    <!-- Babel standalone voor JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js">
    </script>
    <!-- html2canvas en jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f6f8fc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #root {
            width: 100%;
            max-width: 820px;
            margin: 1.5rem auto;
            padding: 0 1rem;
        }
        .card {
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.08);
            padding: 2rem 2rem 2.5rem;
            transition: all 0.2s;
        }
        @media (max-width: 640px) {
            .card {
                padding: 1.25rem 1rem 1.75rem;
                border-radius: 1.5rem;
            }
        }
        .star-btn {
            transition: transform 0.15s ease;
        }
        .star-btn:hover {
            transform: scale(1.15);
        }
        .star-btn:active {
            transform: scale(0.92);
        }
        .radio-card {
            border: 2px solid #e5e9f0;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .radio-card:hover {
            border-color: #b8c4d4;
        }
        .radio-card.selected {
            border-color: #2563eb;
            background: #eff6ff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
        }
        .radio-card input[type="radio"] {
            accent-color: #2563eb;
        }
        .btn-primary {
            background: #1a3d6d;
            color: #fff;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .btn-primary:hover {
            background: #0f2d52;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(26, 61, 109, 0.25);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #eef2f7;
            color: #1a3d6d;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .btn-secondary:hover {
            background: #e0e6ef;
        }
        .btn-secondary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-success {
            background: #0b6e4f;
            color: #fff;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .btn-success:hover {
            background: #085a40;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(11, 110, 79, 0.25);
        }
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .bg-soft-blue {
            background: #f0f5ff;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // ──────────────────────────────────────────────
        // DATA – BWS & ER competenties
        // ──────────────────────────────────────────────

        const DATA = {
            BWS: {
                label: 'BWS (Bevers, Welpen, Scouts)',
                tasks: [{
                    id: 'leidinggeven',
                    label: 'Leidinggeven aan de groep',
                    competencies: [
                        'Een vergadering leiden',
                        'Taken delegeren aan anderen',
                        'Een team motiveren en inspireren',
                        'Beslissingen nemen onder druk',
                        'Feedback geven aan teamleden',
                        'Een activiteitenplanning maken',
                        'Een coachinggesprek voeren',
                        'Een evaluatiebijeenkomst leiden',
                        'Een opkomst voorbereiden en organiseren'
                    ]
                }, {
                    id: 'samenwerken',
                    label: 'Samenwerken met anderen',
                    competencies: [
                        'Samenwerken met andere leiding',
                        'Een groep begeleiden bij activiteiten',
                        'Een veilige groepsdynamiek creëren',
                        'Een groepsgesprek leiden',
                        'Conflicten oplossen binnen de groep',
                        'Een teamoverleg effectief leiden',
                        'De groep aansturen tijdens activiteiten',
                        'Een project coördineren met meerdere leiding',
                        'Een hecht team bouwen en onderhouden'
                    ]
                }, {
                    id: 'pedagogisch',
                    label: 'Pedagogisch handelen',
                    competencies: [
                        'Individuele kinderen begeleiden',
                        'Activiteiten aanpassen aan leeftijdsgroepen',
                        'Een veilige en vertrouwde sfeer creëren',
                        'Kinderen motiveren en enthousiasmeren',
                        'Opbouwende complimenten geven',
                        'Kinderen op een positieve manier corrigeren',
                        'Kinderen coachen in hun ontwikkeling',
                        'Kinderen actief betrekken bij keuzes',
                        'Kinderen zelfstandigheid en verantwoordelijkheid geven'
                    ]
                }]
            },
            ER: {
                label: 'ER (Explorers, Roverscouts)',
                tasks: [{
                    id: 'leidinggeven',
                    label: 'Leidinggeven aan de groep',
                    competencies: [
                        'Een strategische vergadering leiden',
                        'Complexe taken delegeren en monitoren',
                        'Een team inspireren tot eigen initiatief',
                        'Beslissingen nemen met oog op lange termijn',
                        'Constructieve feedback geven en ontvangen',
                        'Een meerjarenplanning opstellen',
                        'Diepgaande coachinggesprekken voeren',
                        'Een kritische evaluatie leiden',
                        'Een kamp of groot evenement organiseren'
                    ]
                }, {
                    id: 'samenwerken',
                    label: 'Samenwerken met anderen',
                    competencies: [
                        'Samenwerken met meerdere teams',
                        'Zelfsturende groepen begeleiden',
                        'Een inclusieve en veilige omgeving waarborgen',
                        'Een dialoog met de groep leiden',
                        'Conflicten bemiddelen op groepsniveau',
                        'Een intervisiebijeenkomst leiden',
                        'De groep coachen naar meer eigenaarschap',
                        'Een meervoudig project coördineren',
                        'Een duurzaam team bouwen met oog voor diversiteit'
                    ]
                }, {
                    id: 'pedagogisch',
                    label: 'Pedagogisch handelen',
                    competencies: [
                        'Individuele jongeren begeleiden in hun groei',
                        'Activiteiten differentiëren naar ontwikkelingsfase',
                        'Een veilige leefomgeving creëren',
                        'Jongeren motiveren tot zelfontplooiing',
                        'Waarderende feedback geven',
                        'Jongeren coachen bij tegenslagen',
                        'Mentorschap bieden aan jongeren',
                        'Jongeren betrekken bij beleidskeuzes',
                        'Jongeren eigen verantwoordelijkheid geven'
                    ]
                }]
            }
        };

        // ──────────────────────────────────────────────
        // HOOK: localStorage
        // ──────────────────────────────────────────────

        function useLocalStorage(key, initial) {
            const [state, setState] = useState(function() {
                try {
                    const raw = localStorage.getItem(key);
                    return raw ? JSON.parse(raw) : initial;
                } catch (_) { return initial; }
            });
            useEffect(function() {
                localStorage.setItem(key, JSON.stringify(state));
            }, [key, state]);
            return [state, setState];
        }

        // ──────────────────────────────────────────────
        // COMPONENT: Sterren
        // ──────────────────────────────────────────────

        function StarRating({ value, onChange, disabled }) {
            return ( <div className = "flex gap-1.5 items-center"> {
                    [1, 2, 3, 4, 5].map(function(star) {
                        return ( <button key = { star }
                            type = "button"
                            className = { "star-btn text-3xl leading-none focus:outline-none " + (disabled ?
                                    'opacity-40 cursor-default' : 'cursor-pointer') }
                            onClick = { function() { if (!disabled) onChange(star); } }
                            disabled = { disabled }
                            aria-label = { "Score " + star + " sterren" }>
                            <span className = { star <= value ? 'text-yellow-400' : 'text-gray-300' }>
                            ★ </span> </button>
                        );
                    })
                } <span className = "ml-2 text-sm font-medium text-gray-500 min-w-[3.5rem]">
                { value> 0 ? value + '/5' : '—' } </span> </div>
            );
        }

        // ──────────────────────────────────────────────
        // COMPONENT: Voortgangsbalk
        // ──────────────────────────────────────────────

        function ProgressBar({ current, total, label }) {
            var pct = total> 0 ? Math.round((current / total) * 100) : 0;
            return ( <div className = "w-full">
                <div className = "flex justify-between text-sm text-gray-600 mb-1">
                <span> { label || 'Voortgang' } </span> <span> { current }
                van { total } </span> </div> <div className = "w-full h-2.5 bg-gray-200 rounded-full overflow-hidden">
                <div className = "h-full bg-blue-600 rounded-full transition-all duration-500 ease-out"
                style = { { width: pct + '%' } }
                /> </div> </div>
            );
        }

        // ──────────────────────────────────────────────
        // COMPONENT: Radar Chart (SVG)
        // ──────────────────────────────────────────────

        function RadarChart({ data, labels, maxScore }) {
            maxScore = maxScore || 100;
            var size = 300;
            var center = size / 2;
            var radius = size / 2 - 32;
            var n = data.length;
            if (n === 0) return React.createElement('div', { className: 'text-center text-gray-400 py-8' },
            'Geen gegevens');

            var angles = Array.from({ length: n }, function(_, i) { return (i / n) * 2 * Math.PI - Math.PI / 2; });

            function toPoint(val, idx) {
                var r = (val / maxScore) * radius;
                return {
                    x: center + r * Math.cos(angles[idx]),
                    y: center + r * Math.sin(angles[idx])
                };
            }

            var rings = [0.25, 0.5, 0.75, 1];
            var axisEnds = angles.map(function(a) { return { x: center + radius * Math.cos(a), y: center + radius * Math.sin(
                        a) }; });
            var points = data.map(function(v, i) { return toPoint(v, i); });
            var polyPoints = points.map(function(p) { return p.x + ',' + p.y; }).join(' ');

            return ( <div className = "radar-container flex justify-center">
                <svg width = { size }
                height = { size }
                viewBox = { '0 0 ' + size + ' ' + size }
                className = "overflow-visible">
                { /* Rings */ } {
                    rings.map(function(r, ri) {
                        var rr = r * radius;
                        var pts = angles.map(function(a) {
                            return (center + rr * Math.cos(a)) + ',' + (center + rr * Math.sin(a));
                        }).join(' ');
                        return React.createElement('polygon', { key: ri, points: pts, fill: 'none',
                            stroke: '#dce1ea', strokeWidth: '1.2' });
                    })
                }
                { /* Assen */ } {
                    axisEnds.map(function(p, i) {
                        return React.createElement('line', { key: i, x1: center, y1: center, x2: p.x,
                            y2: p.y, stroke: '#dce1ea', strokeWidth: '1.2' });
                    })
                }
                { /* Data polygon */ } <polygon points = { polyPoints }
                fill = "rgba(37, 99, 235, 0.22)"
                stroke = "#2563eb"
                strokeWidth = "2.5"
                strokeLinejoin = "round"
                />
                { /* Data punten */ } {
                    points.map(function(p, i) {
                        return React.createElement('circle', { key: i, cx: p.x, cy: p.y, r: '4.5',
                            fill: '#2563eb', stroke: '#fff', strokeWidth: '1.8' });
                    })
                }
                { /* Labels */ } {
                    labels.map(function(label, i) {
                        var a = angles[i];
                        var lr = radius + 22;
                        var x = center + lr * Math.cos(a);
                        var y = center + lr * Math.sin(a);
                        var anchor = (a> Math.PI / 2 && a < 3 * Math.PI / 2) ? 'end' : 'start';
                        var dy = (a === -Math.PI / 2 || a === Math.PI / 2) ? '0.35em' : '0.32em';
                        return React.createElement('text', { key: i, x: x, y: y, dy: dy, textAnchor: anchor,
                            fontSize: '11', fill: '#2d3a4a', fontWeight: '500' }, label);
                    })
                } </svg> </div>
            );
        }

        // ──────────────────────────────────────────────
        // SCHERM 1 – Startpagina
        // ──────────────────────────────────────────────

        function StartPage({ onStart, savedProgress }) {
            var [selected, setSelected] = useState(savedProgress && savedProgress.type ? savedProgress.type : 'BWS');
            var hasProgress = savedProgress && savedProgress.answers && Object.keys(savedProgress.answers).length> 0;

            return ( <div className = "fade-in">
                <div className = "text-center mb-8">
                <div className = "inline-block bg-blue-50 rounded-full px-4 py-1.5 text-sm font-medium text-blue-700 mb-3">
                ⚜️ Scouting Nederland </div> <h1 className = "text-3xl sm:text-4xl font-bold text-gray-800 tracking-tight">
                Competentieroos </h1> <p className = "text-gray-500 mt-2 text-balance max-w-lg mx-auto">
                Ontdek waar je staat als leidinggevende. Beoordeel jezelf op 27 competenties en krijg inzicht in je
                sterke punten en ontwikkelkansen. </p> </div>

                <div className = "bg-soft-blue rounded-2xl p-5 mb-6 border border-blue-100">
                <h2 className = "font-semibold text-gray-700 flex items-center gap-2">
                <span className = "text-xl"> 📋 </span> Hoe werkt de schaal? </h2> <div className = "grid grid-cols-5 gap-1 mt-3 text-center text-sm"> {
                    [1, 2, 3, 4, 5].map(function(n) {
                        return ( <div key = { n }
                            className = "bg-white rounded-xl p-2 shadow-sm">
                            <div className = "text-2xl"> { '★'.repeat(n) } { '☆'.repeat(5 - n) } </div> <div className = "text-xs text-gray-600 mt-1">
                            { n === 1 && 'Weet ik niet' } { n === 2 && 'Een beetje' } { n === 3 &&
                                'Redelijk' } { n === 4 && 'Goed' } { n === 5 && 'Kan ik uitleggen' } </div> </div>
                        );
                    })
                } </div> </div>

                <div className = "grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6"> {
                    ['BWS', 'ER'].map(function(key) {
                        var info = DATA[key];
                        return ( <label key = { key }
                            className = { "radio-card rounded-2xl p-4 flex items-start gap-3 " + (selected ===
                                    key ? 'selected' : '') }>
                            <input type = "radio"
                            name = "type"
                            value = { key }
                            checked = { selected === key }
                            onChange = { function() { setSelected(key); } }
                            className = "mt-1" />
                            <div>
                            <div className = "font-semibold text-gray-800"> { info.label } </div> <div className = "text-sm text-gray-500">
                            3 taken · 27 competenties </div> </div> </label>
                        );
                    })
                } </div>

                {
                    hasProgress && ( <div className = "bg-amber-50 border border-amber-200 rounded-xl p-3 mb-5 text-sm text-amber-800 flex items-center gap-2">
                        <span className = "text-lg"> ⏳ </span> Je hebt een vorige sessie. Klik op 'Verder gaan' om
                        verder te gaan, of 'Opnieuw' om te herstarten. </div>
                    )
                }

                <div className = "flex flex-wrap gap-3 justify-center mt-2">
                <button className = "btn-primary"
                onClick = { function() { onStart(selected, false); } }>
                { hasProgress ? 'Verder gaan' : 'Start vragenlijst' } </button> {
                    hasProgress && ( <button className = "btn-secondary"
                        onClick = { function() {
                                if (confirm('Weet je zeker dat je opnieuw wilt beginnen? Je voortgang gaat verloren.')) {
                                    onStart(selected, true);
                                }
                            } }>
                        Opnieuw starten </button>
                    )
                } </div> </div>
            );
        }

        // ──────────────────────────────────────────────
        // SCHERM 2 – Vragenlijst
        // ──────────────────────────────────────────────

        function Questionnaire({ type, initialAnswers, onComplete, onBack }) {
            var info = DATA[type];
            var allCompetencies = info.tasks.flatMap(function(t) { return t.competencies; });
            var total = allCompetencies.length;

            var flatItems = info.tasks.flatMap(function(task, ti) {
                return task.competencies.map(function(comp, ci) {
                    return {
                        taskIdx: ti,
                        compIdx: ci,
                        taskId: task.id,
                        taskLabel: task.label,
                        label: comp,
                        key: task.id + '-' + ci
                    };
                });
            });

            var [answers, setAnswers] = useState(function() {
                var init = {};
                flatItems.forEach(function(item) {
                    init[item.key] = (initialAnswers && initialAnswers[item.key]) ? initialAnswers[item
                    .key] : 0;
                });
                return init;
            });

            var [currentIdx, setCurrentIdx] = useState(function() {
                var idx = flatItems.findIndex(function(item) { return (answers[item.key] || 0) === 0; });
                return idx>= 0 ? idx : 0;
            });

            var current = flatItems[currentIdx];
            var answeredCount = Object.values(answers).filter(function(v) { return v> 0; }).length;

            function handleScore(val) {
                if (!current) return;
                var newAnswers = Object.assign({}, answers);
                newAnswers[current.key] = val;
                setAnswers(newAnswers);
            }

            function goNext() {
                if (currentIdx <flatItems.length - 1) {
                    setCurrentIdx(currentIdx + 1);
                } else {
                    onComplete(answers);
                }
            }

            function goPrev() {
                if (currentIdx> 0) setCurrentIdx(currentIdx - 1);
            }

            // Toetsenbord
            useEffect(function() {
                function handler(e) {
                    if (e.key === 'ArrowRight' || e.key === 'Enter') {
                        e.preventDefault();
                        if (answers[current && current.key]> 0) goNext();
                    }
                    if (e.key === 'ArrowLeft') { e.preventDefault();
                        goPrev(); }
                    if (e.key>= '1' && e.key <= '5') {
                        handleScore(parseInt(e.key, 10));
                    }
                }
                window.addEventListener('keydown', handler);
                return function() { window.removeEventListener('keydown', handler); };
            }, [currentIdx, answers, current]);

            if (!current) return React.createElement('div', null, 'Geen vragen beschikbaar');

            var task = info.tasks[current.taskIdx];

            return ( <div className = "fade-in">
                <div className = "mb-5">
                <div className = "flex justify-between text-sm text-gray-500 mb-1">
                <span> <span className = "font-medium text-gray-700"> { task.label } </span> · Vraag { currentIdx + 1 }
                van { total } </span> <span> { Math.round(((currentIdx) / total) * 100) }% </span> </div> <ProgressBar current = { currentIdx }
                total = { total }
                /> </div>

                <div className = "bg-white rounded-2xl border border-gray-200 p-5 sm:p-7 mb-5 shadow-sm">
                <div className = "flex items-start gap-3 mb-1">
                <span className = "text-blue-600 font-semibold text-sm bg-blue-50 px-3 py-0.5 rounded-full">
                Taak { current.taskIdx + 1 } </span> <span className = "text-sm text-gray-400"> / { total } </span> </div> <h3 className = "text-xl sm:text-2xl font-semibold text-gray-800 mt-1 mb-5 leading-snug">
                { current.label } </h3>

                <div className = "flex flex-col gap-2">
                <span className = "text-sm font-medium text-gray-500"> Geef jezelf een score: </span> <StarRating value = { answers[current.key] || 0 }
                onChange = { handleScore }
                /> </div>

                <div className = "mt-6 flex flex-wrap gap-2 justify-between items-center">
                <button className = "btn-secondary nav-btn"
                onClick = { goPrev }
                disabled = { currentIdx === 0 }>
                ← Vorige </button> <button className = "btn-primary nav-btn"
                onClick = { goNext }
                disabled = { (answers[current.key] || 0) === 0 }>
                { currentIdx === total - 1 ? 'Bekijk resultaten →' : 'Volgende →' } </button> </div> </div>

                <div className = "flex justify-between text-xs text-gray-400">
                <span> Gebruik ← → of 1 – 5 op je toetsenbord </span> <span> { answeredCount } / { total } beantwoord </span> </div> </div>
            );
        }

        // ──────────────────────────────────────────────
        // SCHERM 3 – Resultaten
        // ──────────────────────────────────────────────

        function ResultsPage({ type, answers, onBack, onExport }) {
            var info = DATA[type];
            var tasks = info.tasks;

            var taskScores = tasks.map(function(task) {
                var comps = task.competencies;
                var scores = comps.map(function(_, ci) {
                    var key = task.id + '-' + ci;
                    return answers[key] || 0;
                });
                var sum = scores.reduce(function(a, b) { return a + b; }, 0);
                var max = comps.length * 5;
                var pct = max> 0 ? Math.round((sum / max) * 100) : 0;
                return { taskLabel: task.label, pct: pct, scores: scores, max: max };
            });

            var overallPct = Math.round(taskScores.reduce(function(a, t) { return a + t.pct; }, 0) / taskScores.length);

            var radarData = taskScores.map(function(t) { return t.pct; });
            var radarLabels = tasks.map(function(t) { return t.label.replace(/^.{1,8}\s/, ''); });

            function getColor(pct) {
                if (pct>= 70) return 'text-green-700 bg-green-50 border-green-200';
                if (pct>= 45) return 'text-amber-700 bg-amber-50 border-amber-200';
                return 'text-red-700 bg-red-50 border-red-200';
            }

            function getIcon(pct) {
                if (pct>= 70) return '✅';
                if (pct>= 45) return '📈';
                return '🔄';
            }

            function getLabel(pct) {
                if (pct>= 70) return 'Sterk';
                if (pct>= 45) return 'In ontwikkeling';
                return 'Aandacht nodig';
            }

            return ( <div className = "fade-in">
                <div className = "text-center mb-6">
                <h2 className = "text-2xl sm:text-3xl font-bold text-gray-800">
                🎯 Jouw Competentieroos </h2> <p className = "text-gray-500 mt-1">
                { info.label } · Totaalscore <span className = "font-semibold text-gray-700"> { overallPct }% </span> </p> </div>

                <div className = "bg-white rounded-2xl border border-gray-200 p-4 sm:p-6 mb-6 shadow-sm">
                <RadarChart data = { radarData }
                labels = { radarLabels }
                maxScore = { 100 }
                /> </div>

                <div className = "grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6"> {
                    taskScores.map(function(t, i) {
                        var color = getColor(t.pct);
                        return ( <div key = { i }
                            className = { "result-chip rounded-2xl border p-4 " + color }>
                            <div className = "flex items-center justify-between">
                            <span className = "font-medium text-sm"> { t.taskLabel.replace(/^.{1,8}\s/, '') } </span> <span className = "text-2xl"> { getIcon(t.pct) } </span> </div> <div className = "mt-1 flex items-end justify-between">
                            <span className = "text-2xl font-bold"> { t.pct }% </span> <span className = "text-sm opacity-80"> { getLabel(t.pct) } </span> </div> </div>
                        );
                    })
                } </div>

                <div className = "flex flex-wrap gap-3 justify-center">
                <button className = "btn-secondary nav-btn"
                onClick = { onBack }>
                ← Terug naar vragen </button> <button className = "btn-success nav-btn"
                onClick = { function() { onExport(type, answers); } }>
                📄 Download PDF </button> </div> </div>
            );
        }

        // ──────────────────────────────────────────────
        // APP – Hoofdcomponent
        // ──────────────────────────────────────────────

        function App() {
            var [step, setStep] = useState('start'); // 'start' | 'question' | 'results'
            var [type, setType] = useState('BWS');
            var [answers, setAnswers] = useState({});
            var [saved, setSaved] = useLocalStorage('competentieroos_progress', null);
            var [exporting, setExporting] = useState(false);
            var resultsRef = useRef(null);

            // Bij start: als er een opgeslagen sessie is, kunnen we die gebruiken
            useEffect(function() {
                // niets speciaals
            }, []);

            function handleStart(selectedType, reset) {
                setType(selectedType);
                if (reset) {
                    var empty = {};
                    var info = DATA[selectedType];
                    info.tasks.forEach(function(task) {
                        task.competencies.forEach(function(_, ci) {
                            empty[task.id + '-' + ci] = 0;
                        });
                    });
                    setAnswers(empty);
                    setSaved({ type: selectedType, answers: empty });
                } else if (saved && saved.type === selectedType && saved.answers) {
                    setAnswers(saved.answers);
                } else {
                    var empty2 = {};
                    var info2 = DATA[selectedType];
                    info2.tasks.forEach(function(task) {
                        task.competencies.forEach(function(_, ci) {
                            empty2[task.id + '-' + ci] = 0;
                        });
                    });
                    setAnswers(empty2);
                    setSaved({ type: selectedType, answers: empty2 });
                }
                setStep('question');
            }

            function handleQuestionComplete(finalAnswers) {
                setAnswers(finalAnswers);
                setSaved({ type: type, answers: finalAnswers });
                setStep('results');
            }

            function handleBackToQuestion() {
                setStep('question');
            }

            function handleExportPDF(type, answers) {
                setExporting(true);
                // We gebruiken een tijdelijk element om de resultaten te renderen en te exporteren
                // We gebruiken de huidige resultaten-pagina, maar die is niet zichtbaar tijdens export.
                // Daarom klonen we de resultaten in een verborgen div.
                var container = document.getElementById('export-container');
                if (!container) {
                    // maak een container
                    var newContainer = document.createElement('div');
                    newContainer.id = 'export-container';
                    newContainer.style.position = 'absolute';
                    newContainer.style.left = '-9999px';
                    newContainer.style.top = '0';
                    newContainer.style.width = '800px';
                    newContainer.style.background = '#fff';
                    newContainer.style.padding = '40px';
                    newContainer.style.fontFamily = 'Inter, sans-serif';
                    document.body.appendChild(newContainer);
                    container = newContainer;
                }
                // Bouw de export HTML in de container
                var info = DATA[type];
                var tasks = info.tasks;
                var taskScores = tasks.map(function(task) {
                    var scores = task.competencies.map(function(_, ci) {
                        var key = task.id + '-' + ci;
                        return answers[key] || 0;
                    });
                    var sum = scores.reduce(function(a, b) { return a + b; }, 0);
                    var max = task.competencies.length * 5;
                    var pct = max> 0 ? Math.round((sum / max) * 100) : 0;
                    return { label: task.label, pct: pct };
                });
                var overallPct = Math.round(taskScores.reduce(function(a, t) { return a + t.pct; }, 0) / taskScores
                .length);
                var radarData = taskScores.map(function(t) { return t.pct; });
                var radarLabels = tasks.map(function(t) { return t.label.replace(/^.{1,8}\s/, ''); });

                // HTML voor export
                var html = '<div style="text-align:center;margin-bottom:28px;">';
                html += '<div style="font-size:14px;color:#1a4c8a;font-weight:600;letter-spacing:0.5px;margin-bottom:4px;">⚜️ Scouting Nederland</div>';
                html += '<h1 style="font-size:28px;font-weight:700;color:#1a2a3a;margin:0 0 4px;">Competentieroos</h1>';
                html += '<p style="font-size:15px;color:#5a6a7a;margin:0;">' + info.label + ' · Resultatenoverzicht</p>';
                html += '</div>';

                // Radar chart als SVG (we gebruiken een simpele benadering)
                // We kunnen dezelfde RadarChart component renderen, maar hier bouwen we eenvoudige weergave
                // In plaats van complexe SVG, gebruiken we een simpele balk weergave voor PDF.
                // Maar we kunnen wel een canvas gebruiken. Laten we het simpel houden: staafdiagram.
                html +=
                    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-bottom:28px;">';
                html += '<div><h3 style="font-size:16px;font-weight:600;margin-bottom:12px;">Overzicht per taak</h3>';
                taskScores.forEach(function(t) {
                    var color = t.pct>= 70 ? '#0b6e4f' : (t.pct>= 45 ? '#b45309' : '#b91c1c');
                    html += '<div style="margin-bottom:14px;">';
                    html += '<div style="display:flex;justify-content:space-between;font-size:14px;font-weight:500;">';
                    html += '<span>' + t.label + '</span>';
                    html += '<span style="color:' + color + ';">' + t.pct + '%</span>';
                    html += '</div>';
                    html += '<div style="height:6px;background:#e5e9f0;border-radius:4px;overflow:hidden;">';
                    html += '<div style="height:100%;width:' + t.pct + '%;background:' + color +
                        ';border-radius:4px;"></div>';
                    html += '</div>';
                    html += '</div>';
                });
                html += '</div>';
                html += '<div><h3 style="font-size:16px;font-weight:600;margin-bottom:12px;">Totaalscore</h3>';
                html += '<div style="font-size:48px;font-weight:700;color:#1a3d6d;">' + overallPct + '%</div>';
                html += '<div style="margin-top:12px;font-size:14px;color:#5a6a7a;">Beantwoord: ' + Object.values(
                    answers).filter(function(v) { return v> 0; }).length + ' / 27</div>';
                html += '<div style="font-size:14px;color:#5a6a7a;">Datum: ' + new Date().toLocaleDateString(
                    'nl-NL') + '</div>';
                html += '</div></div>';
                html +=
                    '<div style="margin-top:24px;font-size:12px;color:#8a9aaa;text-align:center;border-top:1px solid #eef2f7;padding-top:16px;">Gegenereerd met de Competentieroos – © Scouting Nederland</div>';

                container.innerHTML = html;

                // Gebruik html2canvas om de container te renderen
                setTimeout(function() {
                    html2canvas(container, {
                        scale: 2,
                        backgroundColor: '#ffffff',
                        useCORS: true,
                        logging: false
                    }).then(function(canvas) {
                        var imgData = canvas.toDataURL('image/png');
                        var pdf = new window.jspdf.jsPDF('p', 'mm', 'a4');
                        var pdfWidth = pdf.internal.pageSize.getWidth();
                        var pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                        pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                        pdf.save('competentieroos-resultaat.pdf');
                        setExporting(false);
                        // clean up container
                        container.innerHTML = '';
                    }).catch(function(err) {
                        console.error('PDF error:', err);
                        alert('Er ging iets mis bij het genereren van de PDF. Probeer het opnieuw.');
                        setExporting(false);
                    });
                }, 300);
            }

            return ( <div className = "card">
                    <div className = "min-h-[480px]"> {
                        step === 'start' && React.createElement(StartPage, { onStart: handleStart,
                            savedProgress: saved })
                    } {
                        step === 'question' && React.createElement(Questionnaire, { type: type,
                            initialAnswers: answers, onComplete: handleQuestionComplete, onBack: function() {
                                setStep('start');
                            } })
                    } {
                        step === 'results' && React.createElement(ResultsPage, { type: type, answers: answers,
                            onBack: handleBackToQuestion, onExport: handleExportPDF })
                    } </div> {
                        exporting && ( <div className = "fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50 p-4"
                            style = { { background: 'rgba(0,0,0,0.25)' } }>
                            <div className = "bg-white rounded-3xl p-6 max-w-md w-full shadow-2xl text-center">
                            <div className = "animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mx-auto mb-4">
                            </div> <h3 className = "text-xl font-semibold text-gray-800">
                            PDF wordt gegenereerd… </h3> <p className = "text-gray-500 mt-1 text-sm">
                            Even geduld, je resultaten worden verwerkt. </p> </div> </div>
                        )
                    } </div>
                );
            }

            // ──────────────────────────────────────────────
            // RENDER
            // ──────────────────────────────────────────────

            var root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(App));
    </script>
</body>
</html>
